<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Example</title>
    <style>
        body {
            font-family: Arial;
        }

        .container {
            display: flex;
            justify-content: space-around; 
            width: 100vw;
            align-items: center;           
            height: 300px;
            border: 2px solid hotpink;
            align-items: center;
        
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: yellow;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
            border: 2px solid red;
        }
    </style>
</head>
<body>

    <h2>Flexbox Layout</h2>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
